<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Contact form</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

  <div class="toast hidden">
    <div>
  <img src="./assets/images/icon-success-check.svg" alt="toast check" />
  <spam>Message Sent!</spam>
  </div>
  <p>Thanks for completing the form. We will be in touch!</p>
  </div>
  <div class="form-container">
    <h1>Contact Us</h1>
    <form class="form">
      <div class="name-inputs">
        <div class="form-group"
        <label for="">First Name <span class="star">*</span></label>
        <input type="text" id="first-name" aria-required="true" />
        <span class="error hidden">This field is required</span>
      </div>
      <div class="form-group">
        <label for="">Last Name <span class="star">*</span></label>
        <input type="text" id="last-name" aria-required="true" />
        <span class="error hidden">This field is required</span>
      </div>
     </div>
      <div class="form-group">
        <label for="">Email address <span class="star">*</span></label>
        <input type="email" id="email" aria-required="true" />
        <span class="error hidden">Please enter a valid email address</span>
        <span class="error hidden">This field is required</span>
      </div>
      <div class="form-group radio">
        <label for="query">Querry Type <span class="star">*</span></label>
        <div id="query">
          <div class="query-type">
            <input type="radio" id="option1" name="query-type" aria-required="true">
            <label for="option 1">General Enquiry</label>
        </div>
        <div class="query-type">
          <input type="radio" id="option1" name="query-type" aria-required="true">
          <label for="option 2">Support Request</label>
      </div>
      </div>
      <span class="error hidden">Please select a query type</span>
      </div>
      <div class="form-group">
        <label for="message">Message <span class="star">*</span></label>
        <textarea id="message" rows="4" aria-required="true"></textarea>
        <span class="error hidden">This field is required</span>
      </div>
      <div class="form-group checkbox">
        <div>
          <input type="checkbox" id="consent" aria-required="true">
          <label for="consent">I consent to having this website store my submitted information so they can respond to my inquiry. <span class="star">*</span></label>
        </div>
         <span class="error hidden">You must give consent before submitting</span>
      </div>
      <button type="submit">Send Message</button>
    </form>


</body>
</html>
